server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root __DEPLOY_PATH__;
    index index.html;

    # SPA fallback: every unknown URL serves index.html so client-side routing
    # would work (none today, but cheap to future-proof).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets emitted by Vite (filenames carry a hash).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML — new deploys must be picked up immediately.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
